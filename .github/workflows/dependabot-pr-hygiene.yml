name: Dependabot PR Hygiene

permissions:
  contents: read
  pull-requests: write

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      max_age_days:
        description: "Close Dependabot PRs older than this many days"
        required: false
        default: "14"

jobs:
  close-stale-dependabot-prs:
    name: Close stale Dependabot PRs
    runs-on: ubuntu-latest
    steps:
      - name: Close old Dependabot PRs
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const configuredAge = Number(core.getInput("max_age_days") || "14");
            const maxAgeDays = Number.isFinite(configuredAge) && configuredAge > 0 ? configuredAge : 14;
            const cutoff = Date.now() - maxAgeDays * 24 * 60 * 60 * 1000;

            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const staleDependabotPrs = openPrs.filter((pr) => {
              const isDependabot = pr.user?.login === "app/dependabot" || pr.user?.login === "dependabot[bot]";
              if (!isDependabot) return false;

              const hasKeepOpenLabel = (pr.labels || []).some((l) => l.name === "keep-open");
              if (hasKeepOpenLabel) return false;

              return new Date(pr.created_at).getTime() < cutoff;
            });

            core.info(`Open PRs: ${openPrs.length}`);
            core.info(`Stale Dependabot PRs to close: ${staleDependabotPrs.length}`);

            for (const pr of staleDependabotPrs) {
              const ageDays = Math.floor(
                (Date.now() - new Date(pr.created_at).getTime()) / (24 * 60 * 60 * 1000)
              );

              const body = [
                "Closing this Dependabot PR automatically as part of repository hygiene.",
                "",
                `Reason: PR age (${ageDays} days) is above threshold (${maxAgeDays} days).`,
                "",
                "If you want to keep a Dependabot PR open, add label `keep-open`.",
                "Dependabot will open fresh update PRs as needed.",
              ].join("\n");

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                state: "closed",
              });

              core.info(`Closed PR #${pr.number} (${pr.title})`);
            }
