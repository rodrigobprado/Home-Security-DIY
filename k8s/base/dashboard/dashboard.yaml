# =============================================================================
# Dashboard — Home Security DIY (K8s Base)
# =============================================================================
# Inclui: Secret, ConfigMap, Deployments (API + Frontend), Services
# =============================================================================

# --- Secret: credenciais do dashboard ---
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-credentials
  namespace: home-security
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: credentials
type: Opaque
stringData: {}

---
# --- ConfigMap: variáveis não-sensíveis ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: home-security
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: config
data:
  FRIGATE_URL: "http://frigate:5000"
  MQTT_BROKER: "mosquitto"
  TZ: "America/Sao_Paulo"

---
# --- Deployment: API (FastAPI) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-api
  namespace: home-security
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/component: api
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard-api
          image: ttl.sh/home-security-dashboard-api-1771896563:24h
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HA_URL
              valueFrom:
                secretKeyRef:
                  name: dashboard-credentials
                  key: ha-url
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dashboard-credentials
                  key: ha-token
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dashboard-credentials
                  key: database-url
            - name: FRIGATE_URL
              valueFrom:
                configMapKeyRef:
                  name: dashboard-config
                  key: FRIGATE_URL
            - name: MQTT_BROKER
              valueFrom:
                configMapKeyRef:
                  name: dashboard-config
                  key: MQTT_BROKER
            - name: DASHBOARD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-credentials
                  key: dashboard-api-key
            - name: DASHBOARD_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-credentials
                  key: dashboard-admin-key
            - name: DASHBOARD_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: dashboard-credentials
                  key: dashboard-allowed-origins
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: dashboard-config
                  key: TZ
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
# --- Service: API ---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-api
  namespace: home-security
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: api

---
# --- Deployment: Frontend (React + Nginx) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  namespace: home-security
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard-frontend
          image: ttl.sh/home-security-dashboard-frontend-1771896222:24h
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
# --- Service: Frontend ---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: home-security
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: frontend
