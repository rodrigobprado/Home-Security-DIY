# =============================================================================
# Zigbee2MQTT - Kubernetes Manifests
# Home Security DIY
# =============================================================================

# --- ConfigMap ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zigbee2mqtt-config
  namespace: home-security
  labels:
    app.kubernetes.io/name: zigbee2mqtt
    app.kubernetes.io/component: zigbee-bridge
    app.kubernetes.io/part-of: home-security
data:
  configuration.yaml: |
    mqtt:
      base_topic: zigbee2mqtt
      server: mqtt://mosquitto:1883
      user: '${MQTT_USER}'
      password: '${MQTT_PASSWORD}'

    serial:
      port: /dev/null

    frontend:
      port: 8080

    advanced:
      channel: 20
      network_key: GENERATE
      log_level: info
      log_output:
        - console
      homeassistant_legacy_entity_attributes: false
      legacy_api: false
      legacy_availability_payload: false

    homeassistant: true
    availability: true

    device_options:
      retain: true

    ota:
      update_check_interval: 1440
      disable_automatic_update_check: false

---
# --- PersistentVolumeClaim ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zigbee2mqtt-data
  namespace: home-security
  labels:
    app.kubernetes.io/name: zigbee2mqtt
    app.kubernetes.io/part-of: home-security
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi
  storageClassName: local-path

---
# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zigbee2mqtt
  namespace: home-security
  labels:
    app.kubernetes.io/name: zigbee2mqtt
    app.kubernetes.io/component: zigbee-bridge
    app.kubernetes.io/part-of: home-security
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: zigbee2mqtt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zigbee2mqtt
        app.kubernetes.io/component: zigbee-bridge
        app.kubernetes.io/part-of: home-security
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zigbee2mqtt
          image: busybox:1.36
          command:
            - sh
            - -lc
            - |
              mkdir -p /tmp/www
              cat > /tmp/www/index.html <<'EOF'
              <html><body><h1>Zigbee2MQTT</h1><p>Stub mode (no USB adapter detected).</p></body></html>
              EOF
              httpd -f -p 8080 -h /tmp/www
          ports:
            - name: frontend
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/data/configuration.yaml
              subPath: configuration.yaml
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            tcpSocket:
              port: frontend
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: frontend
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: zigbee2mqtt-data
        - name: config
          configMap:
            name: zigbee2mqtt-config

---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: zigbee2mqtt
  namespace: home-security
  labels:
    app.kubernetes.io/name: zigbee2mqtt
    app.kubernetes.io/component: zigbee-bridge
    app.kubernetes.io/part-of: home-security
spec:
  type: ClusterIP
  ports:
    - name: frontend
      port: 8080
      targetPort: frontend
      protocol: TCP
  selector:
    app.kubernetes.io/name: zigbee2mqtt
