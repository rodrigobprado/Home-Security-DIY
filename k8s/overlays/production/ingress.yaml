# =============================================================================
# Ingress - Home Security DIY (Production)
# =============================================================================
# Traefik Ingress (default K3s ingress controller)
# Expõe Home Assistant, Frigate e Zigbee2MQTT via domínio local.
#
# Configurar DNS local ou /etc/hosts:
#   192.168.15.123  homeassistant-home-security.toca.lan
#   192.168.15.123  frigate-home-security.toca.lan
#   192.168.15.123  zigbee2mqtt-home-security.toca.lan
#   192.168.15.123  dashboard-home-security.toca.lan

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-security-ingress
  namespace: home-security
  labels:
    app.kubernetes.io/name: ingress
    app.kubernetes.io/part-of: home-security
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - secretName: home-security-tls
      hosts:
        - homeassistant-home-security.toca.lan
        - frigate-home-security.toca.lan
        - zigbee2mqtt-home-security.toca.lan
        - dashboard-home-security.toca.lan
  rules:
    # --- Home Assistant ---
    - host: homeassistant-home-security.toca.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homeassistant
                port:
                  number: 8123

    # --- Frigate NVR ---
    - host: frigate-home-security.toca.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frigate
                port:
                  number: 5000

    # --- Zigbee2MQTT ---
    - host: zigbee2mqtt-home-security.toca.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zigbee2mqtt
                port:
                  number: 8080

    # --- Dashboard Operacional ---
    - host: dashboard-home-security.toca.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-frontend
                port:
                  number: 80
