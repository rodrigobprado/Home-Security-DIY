sonar.projectKey=Home-Security-DIY
sonar.sourceEncoding=UTF-8

# Escopo de cobertura focado no backend de ativos e frontend do dashboard.
sonar.sources=src/dashboard/backend/app/routers/assets.py,src/dashboard/frontend/src
sonar.tests=tests/backend,src/dashboard/frontend/src
sonar.test.inclusions=tests/backend/**/*.py,src/dashboard/frontend/src/**/*.test.jsx,src/dashboard/frontend/src/**/*.test.js
sonar.exclusions=**/node_modules/**,**/__pycache__/**,src/dashboard/frontend/src/**/*.test.jsx,src/dashboard/frontend/src/**/*.test.js,src/dashboard/frontend/src/test/**,src/dashboard/frontend/src/main.jsx

# Arquivos com alta complexidade visual/integração e sem cobertura confiável no momento.
sonar.coverage.exclusions=src/dashboard/frontend/src/pages/AssetsAdmin.jsx,src/dashboard/frontend/src/components/OperationalMap.jsx,src/dashboard/frontend/src/hooks/useWebSocket.js

# Relatórios de cobertura gerados no CI.
sonar.python.coverage.reportPaths=coverage/backend-coverage.xml
sonar.javascript.lcov.reportPaths=src/dashboard/frontend/coverage/lcov.info
